<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 120" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="logoGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#312E81" />
      <stop offset="50%" stop-color="#4F46E5" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1E1B4B" />
      <stop offset="100%" stop-color="#4F46E5" />
    </linearGradient>
    <linearGradient id="wingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4" />
      <stop offset="100%" stop-color="#10B981" />
    </linearGradient>
    <!-- Drop Shadow / Glow for AI accent -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Group for Logo Icon (placed on the left) -->
  <g transform="translate(10, 10)">
    <!-- Bottom Book spine / foundation -->
    <path d="M 30 85 Q 58 97 58 80 Q 58 97 86 85" fill="none" stroke="url(#logoGrad)" stroke-width="4" stroke-linecap="round" />
    
    <!-- Left Book Page / Wing -->
    <path d="M 58 75 C 35 75 20 60 20 40 C 30 45 45 50 58 55" fill="url(#logoGrad)" opacity="0.85" />
    
    <!-- Right Book Page / Wing -->
    <path d="M 58 75 C 81 75 96 60 96 40 C 86 45 71 50 58 55" fill="url(#logoGrad)" opacity="0.85" />

    <!-- Central Elevating Arrow / Rocket Core (The 'Lift') -->
    <path d="M 58 25 L 45 50 L 52.5 47.5 L 52.5 75 L 63.5 75 L 63.5 47.5 L 71 50 Z" fill="url(#wingGrad)" filter="url(#glow)" />
    
    <!-- Sparkles of AI intelligence -->
    <path d="M 32.5 25 Q 35 25 35 22.5 Q 35 25 37.5 25 Q 35 25 35 27.5 Q 35 25 32.5 25 Z" fill="#F59E0B" />
    <circle cx="58" cy="15" r="2" fill="#10B981" />
  </g>

  <!-- Typography (placed on the right) -->
  <g transform="translate(130, 0)">
    <!-- "Edu" Text -->
    <text x="0" y="76" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="54" font-weight="800" fill="url(#textGrad)" letter-spacing="-1.5">Edu</text>
    
    <!-- "Lift" Text -->
    <text x="96" y="76" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="54" font-weight="300" fill="#0D9488" letter-spacing="-1">Lift</text>
    
    <!-- "AI" Badge Background -->
    <rect x="195" y="31" width="64" height="48" rx="12" fill="url(#logoGrad)" />
    
    <!-- "AI" Badge Text -->
    <text x="227" y="64" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="26" font-weight="900" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.5">AI</text>

    <!-- Subtitle / Tagline -->
    <text x="2" y="102" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#64748B" letter-spacing="4.5" transform="scale(1, 0.95)">THE TEACHER CAREER OS</text>
  </g>
</svg>
